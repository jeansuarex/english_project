services:
  api:
    build: ./api
    container_name: shakespeare-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    volumes:
      - db-data:/app/data

  web:
    build: ./web
    container_name: shakespeare-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

  admin:
    build: ./admin
    container_name: shakespeare-admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5174:80"

volumes:
  db-data:
